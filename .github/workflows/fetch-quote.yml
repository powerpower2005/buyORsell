name: Fetch Quote

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker e.g. NVDA:NASDAQ"
        required: true
      timeframe:
        description: "Timeframe"
        required: false
        default: "1d"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: fetch-${{ github.event.inputs.ticker || github.event.issue.number || 'batch' }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Parse request
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          INPUT_TICKER: ${{ github.event.inputs.ticker }}
          INPUT_TF: ${{ github.event.inputs.timeframe }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const out = process.env.GITHUB_OUTPUT;
          const event = process.env.EVENT_NAME;
          let ticker = (process.env.INPUT_TICKER || '').trim();
          let timeframe = (process.env.INPUT_TF || '1d').trim() || '1d';

          const TICKER_RE = /^[A-Z0-9.]+:[A-Z]+$|^[A-Z0-9]+-[A-Z]+$/;

          function writeOutput(name, value) {
            const delimiter = `${name}_${Date.now()}`;
            fs.appendFileSync(out, `${name}<<${delimiter}\n${value}\n${delimiter}\n`);
          }

          function skip() {
            writeOutput('skip', 'true');
            process.exit(0);
          }

          writeOutput('skip', 'true');

          function normalizeTicker(raw) {
            return String(raw || '')
              .trim()
              .replace(/\r/g, '')
              .replace(/`/g, '')
              .split(/\s+/)[0];
          }

          function fromTitle(title) {
            if (!title) return '';
            const tagged = title.match(/\[FETCH\]\s*([A-Z0-9.]+:[A-Z]+|[A-Z0-9]+-[A-Z]+)/i);
            if (tagged) return tagged[1].trim();
            const plain = title.match(/\b([A-Z0-9.]+:[A-Z]+|[A-Z0-9]+-[A-Z]+)\b/);
            return plain ? plain[1].trim() : '';
          }

          function fromBody(body) {
            if (!body) return { ticker: '', timeframe: '1d' };
            const tickerMatch =
              body.match(/(?:^|\n)\s*#{1,3}\s*Ticker\s*\n+([^\n#]+)/i) ||
              body.match(/(?:^|\n)\s*Ticker\s*\n+([^\n#]+)/i) ||
              body.match(/\*\*Ticker\*\*\s*\n+([^\n#]+)/i) ||
              body.match(/Ticker\s*:\s*([A-Z0-9.]+:[A-Z]+|[A-Z0-9]+-[A-Z]+)/i);
            const tfMatch =
              body.match(/(?:^|\n)\s*#{1,3}\s*Timeframe\s*\n+([^\n#]+)/i) ||
              body.match(/(?:^|\n)\s*Timeframe\s*\n+([^\n#]+)/i) ||
              body.match(/\*\*Timeframe\*\*\s*\n+([^\n#]+)/i) ||
              body.match(/Timeframe\s*:\s*(\S+)/i);
            return {
              ticker: normalizeTicker(tickerMatch ? tickerMatch[1] : ''),
              timeframe: (tfMatch ? tfMatch[1] : '1d').trim() || '1d',
            };
          }

          if (event === 'schedule') {
            skip();
          }

          if (event === 'issue_comment') {
            const body = (process.env.COMMENT_BODY || '').trim();
            const fetchCmd = body.match(/^\/fetch\s+([A-Z0-9.]+:[A-Z]+|[A-Z0-9]+-[A-Z]+)(?:\s+(\w+))?/i);
            if (!fetchCmd) {
              skip();
            }
            ticker = normalizeTicker(fetchCmd[1]);
            timeframe = fetchCmd[2] || '1d';
          } else if (event === 'issues') {
            const labels = ${{ toJson(github.event.issue.labels.*.name) }};
            const title = process.env.ISSUE_TITLE || '';
            const isFetchIssue =
              labels.includes('fetch-quote') || /^\[FETCH\]/i.test(title.trim());
            if (!isFetchIssue) {
              skip();
            }
            const parsed = fromBody(process.env.ISSUE_BODY);
            ticker = normalizeTicker(fromTitle(title) || parsed.ticker);
            timeframe = parsed.timeframe || '1d';
          }

          if (!ticker || !TICKER_RE.test(ticker)) {
            console.error('Invalid or missing ticker:', JSON.stringify(ticker));
            process.exit(1);
          }

          writeOutput('ticker', ticker);
          writeOutput('timeframe', timeframe);
          writeOutput('skip', 'false');
          NODE

      - name: Skip if not a fetch request
        if: steps.parse.outputs.skip == 'true'
        run: echo "Not a fetch request, skipping."

      - name: Fetch, merge, and backfill history to target
        if: steps.parse.outputs.skip == 'false'
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "${{ steps.parse.outputs.ticker }}"
          # Walk backward in 10-day chunks until backfillTargetBars (900 for 1d).
          # Target only stops past backfill; tip updates may grow the series beyond 900.
          node scripts/validate-and-merge.mjs \
            "${{ steps.parse.outputs.ticker }}" \
            "${{ steps.parse.outputs.timeframe }}"

      - name: Scheduled stale refresh
        if: github.event_name == 'schedule'
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          node <<'NODE'
          (async () => {
          const fs = require('fs');
          const path = require('path');
          const indexPath = 'data/index.json';
          if (!fs.existsSync(indexPath)) process.exit(0);
          const index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
          const policy = JSON.parse(fs.readFileSync('config/data-policy.json', 'utf8'));
          const { validateFreshness } = await import('./scripts/validate-and-merge.mjs');
          for (const entry of index.entries) {
            if (!entry.ticker || !entry.timeframe) continue;
            const full = path.join('data', entry.ticker.replace(/:/g, '-'), entry.timeframe + '.json');
            if (!fs.existsSync(full)) continue;
            const quote = JSON.parse(fs.readFileSync(full, 'utf8'));
            const freshness = validateFreshness(quote, policy, entry.timeframe);
            if (freshness.status === 'stale') {
              console.log('Stale:', entry.ticker, entry.timeframe, freshness.reason);
              require('child_process').execSync(
                `node scripts/validate-and-merge.mjs "${entry.ticker}" "${entry.timeframe}"`,
                { stdio: 'inherit' }
              );
            }
          }
          })().catch((e) => { console.error(e); process.exit(1); });
          NODE

      - name: Commit data
        if: steps.parse.outputs.skip == 'false' || github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "data: scheduled stale refresh"
            else
              git commit -m "data: update ${{ steps.parse.outputs.ticker }} ${{ steps.parse.outputs.timeframe }}"
            fi
            git push
          fi

      - name: Comment on issue
        if: github.event_name == 'issues' && steps.parse.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const ticker = '${{ steps.parse.outputs.ticker }}';
            const tf = '${{ steps.parse.outputs.timeframe }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ \`${ticker}\` (${tf}) data updated. [View app](https://${context.repo.owner}.github.io/${context.repo.repo}/)`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Reply to comment
        if: github.event_name == 'issue_comment' && steps.parse.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const ticker = '${{ steps.parse.outputs.ticker }}';
            const tf = '${{ steps.parse.outputs.timeframe }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ \`${ticker}\` (${tf}) fetch complete.`
            });

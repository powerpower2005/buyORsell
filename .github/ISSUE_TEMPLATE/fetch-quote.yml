name: Fetch Quote Data
description: Request OHLCV fetch for a ticker
title: "[FETCH] "
labels:
  - fetch-quote
body:
  - type: input
    id: ticker
    attributes:
      label: Ticker
      description: "Format NVDA:NASDAQ or BTC-USD"
      placeholder: "NVDA:NASDAQ"
    validations:
      required: true
  - type: dropdown
    id: timeframe
    attributes:
      label: Timeframe
      options:
        - "1d"
        - "1w"
        - "1h"
        - "4h"
        - "15m"
    validations:
      required: true

name: Fetch Quote Data
description: Request OHLCV fetch for a ticker
labels:
  - fetch-quote
body:
  - type: input
    id: ticker
    attributes:
      label: Ticker
      description: "Format NVDA:NASDAQ or BTC-USD"
      placeholder: "NVDA:NASDAQ"
    validations:
      required: true
  - type: input
    id: timeframe
    attributes:
      label: Timeframe
      description: "1d, 1w, 1h, 4h, or 15m"
      placeholder: "1d"
    validations:
      required: true

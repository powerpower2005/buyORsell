name: Fetch Quote Data
description: Request OHLCV fetch for a ticker
labels:
  - fetch-quote
body:
  - type: input
    id: ticker
    attributes:
      label: Ticker
      description: "Format NVDA:NASDAQ or BTC-USD"
      placeholder: "NVDA:NASDAQ"
    validations:
      required: true
  - type: input
    id: timeframe
    attributes:
      label: Timeframe
      description: "1d (primary). 1w is derived from 1d after fetch. 1h/4h/15m not ready yet."
      placeholder: "1d"
    validations:
      required: true
